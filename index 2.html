  const[filter,setFilter]=React.useState("all");const[view,setView]=React.useState("grid");
  const[sel,setSel]=React.useState(null);const[ld,setLd]=React.useState(true);const[lr,setLr]=React.useState(null);

  const fetch2=React.useCallback(async()=>{
    try{const[a,b]=await Promise.all([
      fetch(`${SB}/aria_agent_log?order=created_at.desc&limit=500`,{headers:HD}).then(r=>r.json()).catch(()=>[]),
      fetch(`${SB}/aria_agent_meetings?order=created_at.desc&limit=20`,{headers:HD}).then(r=>r.json()).catch(()=>[]),
    ]);if(Array.isArray(a))setLogs(a);if(Array.isArray(b))setMeetings(b);}catch(e){}
    setLd(false);setLr(new Date());
  },[]);
  React.useEffect(()=>{fetch2();const i=setInterval(fetch2,20000);return()=>clearInterval(i);},[fetch2]);

  const st={};const al={};
  logs.forEach(l=>{const k=l.agent_name;if(!st[k])st[k]={last:l,n:0,ok:0,er:0,it:0};if(!al[k])al[k]=[];st[k].n++;if(l.status==="success")st[k].ok++;if(l.status==="error")st[k].er++;st[k].it+=l.items_processed||0;if(al[k].length<3)al[k].push(l);});

  const teams=Object.keys(T);
  const ft=filter==="all"?teams:[filter];

  return(
    <div style={{background:"#06060a",color:"#d4d4d8",minHeight:"100vh",fontFamily:"'JetBrains Mono','Fira Code',monospace"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
        @keyframes glow{0%,100%{transform:scale(1);opacity:.1}50%{transform:scale(1.3);opacity:.2}}
        @keyframes si{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes scanline{0%{top:0}100%{top:100%}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        @keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}
        .card{background:#0d0d12;border:1px solid #1a1a24;border-radius:12px;padding:14px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
        .card:hover{border-color:#2a2a3a;transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
        .card.on{border-color:var(--tc);box-shadow:0 0 20px var(--tc-glow)}
        .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--tc),transparent);opacity:.3}
        .room{border-radius:16px;padding:16px;margin-bottom:20px;border:1px solid #1a1a24;position:relative;overflow:hidden}
        .room::after{content:'';position:absolute;top:0;right:0;width:120px;height:120px;background:radial-gradient(circle,var(--tc-glow) 0%,transparent 70%);opacity:.04;pointer-events:none}
        .ticker{overflow:hidden;white-space:nowrap;background:#0a0a10;border-top:1px solid #1a1a24;border-bottom:1px solid #1a1a24;padding:6px 0;font-size:11px}
        .ticker span{display:inline-block;animation:ticker 60s linear infinite}
        .tab{padding:6px 16px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid transparent;cursor:pointer;transition:all .2s;letter-spacing:.03em}
        .ft{padding:4px 12px;border-radius:6px;font-size:10px;border:none;cursor:pointer;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
      `}</style>

      {/* ── TOP BAR ── */}
      <div style={{padding:"16px 24px",display:"flex",alignItems:"center",gap:14,borderBottom:"1px solid #1a1a24"}}>
        <div style={{width:38,height:38,borderRadius:10,background:"linear-gradient(135deg,#1A5C3A,#0a1f12)",display:"flex",alignItems:"center",justifyContent:"center",border:"1px solid #1A5C3A40"}}><span style={{color:"#D4A843",fontSize:18,fontWeight:700}}>A</span></div>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:600,letterSpacing:1,textTransform:"uppercase",color:"#e4e4e7"}}>ARIA Mission Control</div>
          <div style={{fontSize:10,color:"#52525b",letterSpacing:.5}}>{Object.keys(st).length} / 46 agents online — live feed{lr&&<span> — {lr.toLocaleTimeString()}</span>}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:6,background:"#0d1a0f",border:"1px solid #1a3a1f"}}>
          <StatusDot s="online"/><span style={{fontSize:10,color:"#22C55E",fontWeight:500,animation:"blink 2s infinite"}}>LIVE</span>
        </div>
        <button onClick={fetch2} style={{padding:"5px 12px",borderRadius:6,border:"1px solid #27272a",background:"#0d0d12",color:"#71717a",fontSize:10,cursor:"pointer",letterSpacing:.5}}>{ld?"...":"REFRESH"}</button>
      </div>

      {/* ── LIVE TICKER ── */}
      <div className="ticker" style={{color:"#3f3f46"}}>
        <span>{logs.slice(0,15).map(l=>{const ag=A.find(x=>x.wf===l.agent_name);return `${ag?.name||l.agent_name}: ${l.status==="success"?"OK":"ERR"} (${tA(l.created_at)})`;}).join("  ●  ")}{logs.length===0?"  Esperando primera actividad de agentes...  ●  Sistema inicializado  ●  46 agentes configurados  ●  Supabase conectado":"  ●  "}</span>
      </div>

      {/* ── TABS ── */}
      <div style={{padding:"12px 24px",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        {["grid","feed","meetings"].map(v=>(<button key={v} className="tab" onClick={()=>setView(v)} style={{background:view===v?"#1a1a24":"transparent",color:view===v?"#fff":"#52525b",borderColor:view===v?"#2a2a3a":"transparent"}}>{v==="grid"?"Mission Rooms":v==="feed"?"Activity Log":"Reuniones"}</button>))}
        <div style={{flex:1}}/>
        {view==="grid"&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button className="ft" onClick={()=>setFilter("all")} style={{background:filter==="all"?"#1a1a24":"transparent",color:filter==="all"?"#fff":"#3f3f46"}}>All</button>
          {teams.map(k=>(<button key={k} className="ft" onClick={()=>setFilter(k)} style={{background:filter===k?T[k].c+"18":"transparent",color:filter===k?T[k].c:"#3f3f46"}}>{T[k].e}</button>))}
        </div>}
      </div>

      <div style={{padding:"0 24px 24px"}}>
        {/* ── MISSION ROOMS ── */}
        {view==="grid"&&ft.map(tk=>{
          const tm=T[tk];const agents=A.filter(a=>a.t===tk);const onCount=agents.filter(a=>st[a.wf]).length;
          return(
            <div key={tk} className="room" style={{"--tc":tm.c,"--tc-glow":tm.c+"30",background:tm.bg,borderColor:tm.c+"15"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                <span style={{fontSize:22}}>{tm.e}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:tm.c,letterSpacing:1.5,textTransform:"uppercase"}}>{tm.n}</div>
                  <div style={{fontSize:9,color:"#52525b"}}>{onCount}/{agents.length} reportando</div>
                </div>
                <div style={{display:"flex",gap:-4}}>{agents.filter(a=>st[a.wf]).slice(0,5).map((a,i)=>(<div key={a.id} style={{marginLeft:i>0?-8:0,zIndex:5-i}}><Av a={a} sz={22} on/></div>))}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
                {agents.map(a=>{
                  const s=st[a.wf];const on=!!s;const rate=s?Math.round(s.ok/Math.max(s.n,1)*100):0;const last3=al[a.wf]||[];const open=sel===a.id;
                  return(
                    <div key={a.id} className={`card ${on?"on":""}`} style={{"--tc":tm.c,"--tc-glow":tm.c+"20"}} onClick={()=>setSel(open?null:a.id)}>
                      {/* Agent header */}
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                        <Av a={a} sz={42} on={on}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <span style={{fontSize:14,fontWeight:700,color:tm.c,letterSpacing:.5}}>{a.name}</span>
                            <StatusDot s={on?s.last.status:"off"}/>
                          </div>
                          <div style={{fontSize:10,color:"#71717a"}}>{a.alias}</div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:tm.c+"12",color:tm.c,fontWeight:600,letterSpacing:.5}}>{a.cr}</div>
                          {s&&<div style={{fontSize:9,color:"#3f3f46",marginTop:2}}>{tA(s.last.created_at)}</div>}
                        </div>
                      </div>

                      {/* Description */}
                      <div style={{fontSize:10,color:"#52525b",lineHeight:1.5,marginBottom:8,minHeight:30,borderLeft:`2px solid ${tm.c}20`,paddingLeft:8}}>{a.role}</div>

                      {/* Stats bar */}
                      {s?(
                        <div style={{marginBottom:6}}>
                          <div style={{background:"#1a1a24",borderRadius:3,height:3,overflow:"hidden",marginBottom:3}}>
                            <div style={{width:rate+"%",height:"100%",borderRadius:3,background:rate>80?"#22C55E":rate>50?"#FBBF24":"#EF4444",transition:"width .6s ease"}}/>
                          </div>
                          <div style={{display:"flex",gap:6,fontSize:9,color:"#3f3f46"}}>
                            <span style={{color:"#22C55E"}}>{s.ok} ok</span>
                            {s.er>0&&<span style={{color:"#EF4444"}}>{s.er} err</span>}
                            <span style={{marginLeft:"auto"}}>{s.it} items</span>
                            <span style={{color:tm.c}}>{rate}%</span>
                          </div>
                        </div>
                      ):<div style={{height:3,background:"#1a1a24",borderRadius:3,marginBottom:6}}/>}

                      {/* Last 3 actions */}
                      <div style={{borderTop:`1px solid ${tm.c}10`,paddingTop:6}}>
                        {last3.length>0?last3.map((l,i)=>(
                          <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"2px 0",fontSize:9}}>
                            <StatusDot s={l.status}/>
                            <span style={{color:"#52525b",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.action}</span>
                            <span style={{color:"#27272a",fontVariantNumeric:"tabular-nums"}}>{tA(l.created_at)}</span>
                          </div>
                        )):<div style={{fontSize:9,color:"#1a1a24",fontStyle:"italic"}}>awaiting first signal...</div>}
                      </div>

                      {/* Expanded */}
                      {open&&<div style={{marginTop:8,padding:10,background:"#08080c",borderRadius:8,fontSize:9,color:"#52525b",lineHeight:1.8,borderTop:`1px solid ${tm.c}15`,animation:"si .3s ease"}}>
                        <div><span style={{color:"#3f3f46"}}>workflow:</span> {a.wf}</div>
                        <div><span style={{color:"#3f3f46"}}>id:</span> {a.id}</div>
                        <div><span style={{color:"#3f3f46"}}>room:</span> <span style={{color:tm.c}}>{tm.n}</span></div>
                        {s&&<div><span style={{color:"#3f3f46"}}>total:</span> {s.n} runs | {s.it} items</div>}
                      </div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}

        {/* ── ACTIVITY LOG ── */}
        {view==="feed"&&<div style={{background:"#0a0a10",borderRadius:12,border:"1px solid #1a1a24",maxHeight:520,overflowY:"auto"}}>
          {logs.length===0?<div style={{padding:"60px 20px",textAlign:"center",fontSize:13,color:"#27272a"}}>Awaiting agent transmissions...</div>:
          logs.slice(0,60).map((l,i)=>{const ag=A.find(x=>x.wf===l.agent_name);const tm=ag?T[ag.t]:{c:"#555"};return(
            <div key={l.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",borderBottom:"1px solid #111118",fontSize:11,animation:`si .2s ease ${Math.min(i*30,500)}ms both`}}>
              {ag&&<Av a={ag} sz={24}/>}
              <StatusDot s={l.status}/>
              <span style={{fontWeight:600,color:tm.c,minWidth:80,letterSpacing:.3}}>{ag?.name||l.agent_name}</span>
              <span style={{color:"#3f3f46",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.action}</span>
              {l.items_processed>0&&<span style={{color:"#27272a",fontSize:10}}>{l.items_processed}x</span>}
              <span style={{color:"#1a1a24",fontSize:10,fontVariantNumeric:"tabular-nums"}}>{tA(l.created_at)}</span>
            </div>);})}
        </div>}

        {/* ── MEETINGS ── */}
        {view==="meetings"&&<div>
          <div style={{fontSize:12,color:"#52525b",marginBottom:12}}>Reuniones proactivas — generadas automaticamente cada viernes 6pm TJ</div>
          {meetings.length===0?<div style={{padding:"40px",textAlign:"center",fontSize:12,color:"#27272a"}}>Primera reunion se genera este viernes</div>:(
          <div style={{display:"grid",gap:8}}>
            {meetings.map(m=>{
              const mn=m.meeting_name||"Reunion";const parts=(m.participants||[]).map(n=>A.find(a=>a.wf===n)).filter(Boolean);
              const dec=m.decision||"pendiente";const DC={pendiente:"#FBBF24",aprobada:"#22C55E",editada:"#60A5FA",rechazada:"#EF4444"};
              return(<div key={m.id} style={{background:"#0d0d12",border:"1px solid #1a1a24",borderRadius:12,padding:"14px 16px",borderLeft:`3px solid ${DC[dec]}`,cursor:"pointer"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:13,fontWeight:600,letterSpacing:.3}}>{mn}</span><span style={{fontSize:8,padding:"1px 6px",borderRadius:4,background:`${DC[dec]}15`,color:DC[dec],fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>{dec}</span></div>
                    <div style={{fontSize:10,color:"#3f3f46",marginTop:3}}>{(m.topic||"").substring(0,80)}</div></div>
                  <div style={{display:"flex"}}>{parts.slice(0,4).map((a,i)=>(<div key={a.id} style={{marginLeft:i>0?-6:0,zIndex:4-i}}><Av a={a} sz={22}/></div>))}</div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:6,fontSize:9,color:"#27272a"}}><span>{(m.insights||[]).length} insights</span><span>{(m.proposals||[]).length} propuestas</span></div>
              </div>);})}
          </div>)}
        </div>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(Observatory));
</script>
</body>
</html>
