        <div style={{flex:1}}/>
        {view==="grid"&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={()=>setFilter("all")} style={{padding:"4px 12px",borderRadius:6,fontSize:10,border:"none",cursor:"pointer",fontWeight:500,textTransform:"uppercase",background:filter==="all"?"#1a1a24":"transparent",color:filter==="all"?"#fff":"#3f3f46"}}>All</button>
          {teams.map(k=>(<button key={k} onClick={()=>setFilter(k)} style={{padding:"4px 12px",borderRadius:6,fontSize:10,border:"none",cursor:"pointer",fontWeight:500,background:filter===k?T[k].c+"18":"transparent",color:filter===k?T[k].c:"#3f3f46"}}>{T[k].e}</button>))}
        </div>}
      </div>

      <div style={{padding:"0 24px 24px"}}>
        {/* MISSION ROOMS */}
        {view==="grid"&&ft.map(tk=>{const tm=T[tk];const agents=A.filter(a=>a.t===tk);const onC=agents.filter(a=>st[a.wf]).length;return(
          <div key={tk} className="rm" style={{"--tc":tm.c,"--tc-glow":tm.c+"30",background:tm.bg,borderColor:tm.c+"15"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
              <span style={{fontSize:22}}>{tm.e}</span>
              <div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:tm.c,letterSpacing:1.5,textTransform:"uppercase"}}>{tm.n}</div><div style={{fontSize:9,color:"#52525b"}}>{onC}/{agents.length} reportando</div></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
              {agents.map(a=>{const s=st[a.wf];const on=!!s;const rate=s?Math.round(s.ok/Math.max(s.n,1)*100):0;const l3=al[a.wf]||[];const op=sel===a.id;return(
                <div key={a.id} className={"cd"+(on?" on":"")} style={{"--tc":tm.c,"--tc-glow":tm.c+"20"}} onClick={()=>setSel(op?null:a.id)}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                    <Av a={a} sz={42} on={on}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14,fontWeight:700,color:tm.c}}>{a.name}</span><SD s={on?s.last.status:"off"}/></div>
                      <div style={{fontSize:10,color:"#71717a"}}>{a.alias}</div>
                    </div>
                    <div style={{textAlign:"right"}}><div style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:tm.c+"12",color:tm.c,fontWeight:600}}>{a.cr}</div>{s&&<div style={{fontSize:9,color:"#3f3f46",marginTop:2}}>{tA(s.last.created_at)}</div>}</div>
                  </div>
                  <div style={{fontSize:10,color:"#52525b",lineHeight:1.5,marginBottom:8,minHeight:28,borderLeft:`2px solid ${tm.c}20`,paddingLeft:8}}>{a.role}</div>
                  {s?<div style={{marginBottom:6}}><div style={{background:"#1a1a24",borderRadius:3,height:3,overflow:"hidden",marginBottom:3}}><div style={{width:rate+"%",height:"100%",borderRadius:3,background:rate>80?"#22C55E":rate>50?"#FBBF24":"#EF4444",transition:"width .6s ease"}}/></div><div style={{display:"flex",gap:6,fontSize:9,color:"#3f3f46"}}><span style={{color:"#22C55E"}}>{s.ok} ok</span>{s.er>0&&<span style={{color:"#EF4444"}}>{s.er} err</span>}<span style={{marginLeft:"auto"}}>{s.it} items</span><span style={{color:tm.c}}>{rate}%</span></div></div>:<div style={{height:3,background:"#1a1a24",borderRadius:3,marginBottom:6}}/>}
                  <div style={{borderTop:`1px solid ${tm.c}10`,paddingTop:6}}>{l3.length>0?l3.map((l,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"2px 0",fontSize:9}}><SD s={l.status}/><span style={{color:"#52525b",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.action}</span><span style={{color:"#27272a"}}>{tA(l.created_at)}</span></div>)):<div style={{fontSize:9,color:"#1a1a24",fontStyle:"italic"}}>awaiting first signal...</div>}</div>
                  {op&&<div style={{marginTop:8,padding:10,background:"#08080c",borderRadius:8,fontSize:9,color:"#52525b",lineHeight:1.8}}><div>workflow: {a.wf}</div><div>id: {a.id}</div><div>room: <span style={{color:tm.c}}>{tm.n}</span></div>{s&&<div>total: {s.n} runs | {s.it} items</div>}</div>}
                </div>)})}
            </div>
          </div>)})}

        {/* ACTIVITY LOG */}
        {view==="feed"&&<div style={{background:"#0a0a10",borderRadius:12,border:"1px solid #1a1a24",maxHeight:600,overflowY:"auto"}}>{logs.length===0?<div style={{padding:"60px 20px",textAlign:"center",fontSize:13,color:"#27272a"}}>Awaiting transmissions...</div>:logs.slice(0,80).map(l=>{const ag=A.find(x=>x.wf===l.agent_name);const tm=ag?T[ag.t]:{c:"#555"};return(<div key={l.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",borderBottom:"1px solid #111118",fontSize:11}}>{ag&&<Av a={ag} sz={24}/>}<SD s={l.status}/><span style={{fontWeight:600,color:tm.c,minWidth:80}}>{ag?.name||l.agent_name}</span><span style={{color:"#3f3f46",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{l.action}</span>{l.items_processed>0&&<span style={{color:"#27272a",fontSize:10}}>{l.items_processed}x</span>}<span style={{color:"#1a1a24",fontSize:10}}>{tA(l.created_at)}</span></div>)})}</div>}

        {/* MEETINGS */}
        {view==="meetings"&&<div><div style={{fontSize:12,color:"#52525b",marginBottom:12}}>Reuniones \u2014 automaticas diario 7pm + on-demand via /reunion</div>{meetings.length===0?<div style={{padding:40,textAlign:"center",fontSize:12,color:"#27272a"}}>Primera reunion hoy a las 7pm</div>:<div style={{display:"grid",gap:8}}>{meetings.map(m=>{const dc=m.decision||"pendiente";const DC={pendiente:"#FBBF24",aprobada:"#22C55E",editada:"#60A5FA",rechazada:"#EF4444"};return(<div key={m.id} style={{background:"#0d0d12",border:"1px solid #1a1a24",borderRadius:12,padding:"14px 16px",borderLeft:`3px solid ${DC[dc]||"#FBBF24"}`}}><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:13,fontWeight:600}}>{m.meeting_name||"Reunion"}</span>{m.is_on_demand&&<span style={{fontSize:8,padding:"1px 6px",borderRadius:4,background:"#8B5CF620",color:"#8B5CF6",fontWeight:600}}>ON-DEMAND</span>}<span style={{fontSize:8,padding:"1px 6px",borderRadius:4,background:`${DC[dc]||"#FBBF24"}15`,color:DC[dc]||"#FBBF24",fontWeight:600,textTransform:"uppercase"}}>{dc}</span></div><div style={{fontSize:10,color:"#3f3f46",marginTop:3}}>{(m.topic||"").substring(0,100)}</div><div style={{display:"flex",gap:8,marginTop:6,fontSize:9,color:"#27272a"}}><span>{(m.insights||[]).length} insights</span><span>{(m.proposals||[]).length} propuestas</span><span style={{marginLeft:"auto"}}>{tA(m.created_at)}</span></div></div>)})}</div>}</div>}

        {/* MEMORY */}
        {view==="memory"&&<div><div style={{fontSize:12,color:"#52525b",marginBottom:12}}>\ud83e\udde0 Memoria ARIA \u2014 {memories.length} memorias activas, auto-decay 30d</div><div style={{display:"grid",gap:8}}>{memories.map(m=>{const emoji={decision:"\u2705",pattern:"\ud83d\udd04",learning:"\ud83d\udca1",context:"\ud83d\udccc",preference:"\u2699\ufe0f"}[m.memory_type]||"\ud83d\udcdd";const catColor={cobranza:"#FBBF24",operacion:"#FB923C",regulatorio:"#EF4444",equipo:"#60A5FA",cliente:"#34D399",tecnologia:"#8B5CF6",general:"#71717a"}[m.category]||"#555";return(<div key={m.id} style={{background:"#0d0d12",border:"1px solid #1a1a24",borderRadius:10,padding:"12px 16px",borderLeft:`3px solid ${catColor}`}}><div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}><span style={{fontSize:14}}>{emoji}</span><span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:catColor+"18",color:catColor,fontWeight:600,textTransform:"uppercase"}}>{m.category}</span><span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:"#1a1a24",color:"#52525b"}}>{m.memory_type}</span><span style={{marginLeft:"auto",fontSize:9,color:"#27272a"}}>rel: {(m.relevance_score||0).toFixed(2)}</span></div><div style={{fontSize:11,color:"#d4d4d8",lineHeight:1.6}}>{m.content}</div>{m.tags?.length>0&&<div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>{m.tags.map((t,i)=><span key={i} style={{fontSize:8,padding:"1px 6px",borderRadius:4,background:"#1a1a24",color:"#3f3f46"}}>#{t}</span>)}</div>}</div>)})}</div></div>}

        {/* ALERTS */}
        {view==="alerts"&&<div><div style={{fontSize:12,color:"#52525b",marginBottom:12}}>\ud83d\udea8 Alertas Proactivas \u2014 {alerts.length} pendientes + {health.length} health checks abiertos</div>{alerts.length===0&&health.length===0?<div style={{padding:40,textAlign:"center",fontSize:13,color:"#27272a"}}>\u2705 Sin alertas pendientes. Todo bajo control.</div>:<div style={{display:"grid",gap:8}}>{alerts.map(a=>{const sev={critical:"#EF4444",warning:"#FBBF24",info:"#60A5FA"}[a.severity]||"#555";return(<div key={a.id} style={{background:"#0d0d12",border:"1px solid #1a1a24",borderRadius:10,padding:"12px 16px",borderLeft:`3px solid ${sev}`}}><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:sev+"18",color:sev,fontWeight:700,textTransform:"uppercase"}}>{a.severity}</span><span style={{fontSize:12,fontWeight:600,color:"#e4e4e7"}}>{a.title}</span></div>{a.body&&<div style={{fontSize:10,color:"#52525b",marginTop:4}}>{a.body}</div>}{a.suggested_action&&<div style={{fontSize:10,color:"#34D399",marginTop:4}}>\u2192 {a.suggested_action}</div>}<div style={{fontSize:9,color:"#27272a",marginTop:4}}>{tA(a.created_at)} \u2022 {(a.source_agents||[]).join(", ")}</div></div>)})}{health.length>0&&<div style={{marginTop:12}}><div style={{fontSize:11,fontWeight:600,color:"#F43F5E",marginBottom:8}}>\ud83c\udfe5 Health Checks Abiertos</div>{health.map(h=>{const sev={critical:"#EF4444",error:"#FB923C",warning:"#FBBF24",info:"#60A5FA"}[h.severity]||"#555";return(<div key={h.id} style={{background:"#0d0d12",border:"1px solid #1a1a24",borderRadius:8,padding:"10px 14px",borderLeft:`2px solid ${sev}`,marginBottom:6}}><div style={{fontSize:11,color:"#d4d4d8"}}>{h.issue}</div><div style={{fontSize:9,color:"#3f3f46",marginTop:3}}>{h.workflow_name} \u2022 {h.check_type} \u2022 {tA(h.created_at)}</div></div>)})}</div>}</div>}</div>}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(MissionControlApp));
</script>
</body>
</html>
