#root{max-width:1700px;margin:0 auto}

.cd{background:#0d0d12;border:1px solid #1a1a24;border-radius:12px;padding:14px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.cd:hover{border-color:#2a2a3a;transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.55)}
.cd.on{border-color:var(--tc);box-shadow:0 0 18px var(--tc-glow)}
.cd::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--tc),transparent);opacity:.35}
.rm{border-radius:16px;padding:16px;margin-bottom:20px;border:1px solid #1a1a24;position:relative;overflow:hidden}
.rm::after{content:'';position:absolute;top:0;right:0;width:160px;height:160px;background:radial-gradient(circle,var(--tc-glow) 0%,transparent 70%);opacity:.06;pointer-events:none}
.tk{overflow:hidden;white-space:nowrap;background:#0a0a10;border-top:1px solid #1a1a24;border-bottom:1px solid #1a1a24;padding:6px 0;font-size:11px}
.tk span{display:inline-block;animation:ticker 80s linear infinite}
.loader::after{content:".";animation:dots 1.2s steps(3,end) infinite}
.bdg{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px}
.btn{min-width:40px;min-height:32px;padding:6px 14px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid transparent;font-family:inherit;transition:all .15s}
.btn:hover{border-color:#2a2a3a}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:90;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:#0a0a10;border:1px solid #27272a;border-radius:14px;padding:24px;max-width:720px;width:100%;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:#1a1a24;border:none;color:#a1a1aa;cursor:pointer;width:32px;height:32px;border-radius:6px;font-size:14px;font-family:inherit}
.modal-close:hover{background:#27272a;color:#fff}
details summary{cursor:pointer;padding:6px 0;color:#71717a;font-size:11px;user-select:none}
details summary:hover{color:#a1a1aa}
.spark-bar{flex:1;min-width:4px;background:var(--tc);border-radius:1px;opacity:.5;transition:opacity .2s}
.spark-bar:hover{opacity:1}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#06060a}
::-webkit-scrollbar-thumb{background:#1a1a24;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#27272a}
</style>

const FaceBase = ({ color, s=80, children, headColor }) => {
  const cx = s/2, cy = s/2, r = s*.4, ey = cy - s*.04;
  const lx = cx - s*.14, rx = cx + s*.14;
  const R = s*.09, pR = R*.55;
  return (
    <g>
      <circle cx={cx} cy={cy} r={r} fill={headColor || color}/>
      <ellipse cx={lx} cy={ey} rx={R} ry={R*1.15} fill="#fff"/>
      <ellipse cx={rx} cy={ey} rx={R} ry={R*1.15} fill="#fff"/>
      <circle cx={lx+1.5} cy={ey+1} r={pR} fill="#0f0f1a"/>
      <circle cx={rx+1.5} cy={ey+1} r={pR} fill="#0f0f1a"/>
      <circle cx={lx+2} cy={ey-.5} r={pR*.3} fill="#fff"/>
      <circle cx={rx+2} cy={ey-.5} r={pR*.3} fill="#fff"/>
      {children}
    </g>
  );
};

const Mouth = ({ type, s=80 }) => {
  const cx = s/2, cy = s/2;
  if (type === "flat") return <line x1={cx-s*.07} y1={cy+s*.15} x2={cx+s*.07} y2={cy+s*.15} stroke="#fff" strokeWidth={s*.028} strokeLinecap="round"/>;
  return <path d={`M${cx-s*.09} ${cy+s*.14}Q${cx} ${cy+s*.21} ${cx+s*.09} ${cy+s*.14}`} stroke="#fff" fill="none" strokeWidth={s*.028} strokeLinecap="round"/>;
};

const STATUS = {
  OK:         { label:"OK",          icon:"✅", color:"#22C55E" },
  IDLE:       { label:"IDLE",        icon:"💤", color:"#71717a" },
  WARNING:    { label:"WARNING",     icon:"⚠️", color:"#FBBF24" },
  ERROR:      { label:"ERROR",       icon:"❌", color:"#EF4444" },
  FIXPENDING: { label:"FIX-PENDING", icon:"🔧", color:"#FB923C" },
};

const FIX_PENDING_IDS = new Set(["LhQW"]);

const classifyTriggerType = (cr) => {
  if (!cr) return "manual";
  for (const [k,v] of Object.entries(TRIG_TYPES)) if (v.match.test(cr)) return k;
  return "manual";
};

const expectsDaily = (cr) => /diario|7am|7:30|6am|6:15am|5pm|7pm|^\d+(am|pm)|^\d+:\d+|mie|vie|ma\/ju|vi\s*6pm|sem|l\s*7am/i.test(cr || "");

const hoursAgo = (iso) => iso ? (Date.now() - new Date(iso).getTime()) / 3600000 : Infinity;

const computeStatus = (agent, s) => {
  if (FIX_PENDING_IDS.has(agent.id)) return "FIXPENDING";
  if (!s || !s.last24) {
    if (expectsDaily(agent.cr)) return "WARNING";
    return "IDLE";
  }
  if (s.err24 > 0) return "ERROR";
  if (s.ok24 > 0) return "OK";
  if (expectsDaily(agent.cr)) return "WARNING";
  return "IDLE";
};

const tA = (d) => {
  if (!d) return "";
  const s = Math.floor((Date.now() - new Date(d).getTime()) / 1000);
  if (s < 60) return s+"s";
  if (s < 3600) return Math.floor(s/60)+"m";
  if (s < 86400) return Math.floor(s/3600)+"h";
  return Math.floor(s/86400)+"d";
};

// --- CRITICAL ERROR DETECTION ---
const detectCriticalErrors = (logs, alerts, health) => {
  const errors = [];
  const corpus = [
    ...logs.slice(0,200).map(l => (l.action||"") + " " + JSON.stringify(l.details||{})),
    ...alerts.map(a => (a.title||"") + " " + (a.body||"")),
    ...health.map(h => (h.issue||"")),
  ].join(" ").toLowerCase();

  if (/openai.*quota|insufficient[_ ]quota|429.*openai|rate[_ ]limit.*openai/i.test(corpus)) {
    errors.push({
      severity:"critical", kind:"openai-quota",
      title:"OpenAI quota agotada",
      detail:"Uno o mas agentes reportan 429 / insufficient_quota en llamadas a OpenAI. Los workflows que dependen de GPT estan fallando.",
      fix:[ "Verificar billing en platform.openai.com/usage",
            "Recargar creditos o subir tier",
            "Considerar fallback a Claude/Gemini para workflows no-criticos",
            "Revisar agentes afectados en Activity Feed filtrando status=error"]
    });
  }
  if (/notion.*unauthorized|notion.*invalid[_ ]?token|notion_api_token|notion.*401/i.test(corpus)) {
    errors.push({
      severity:"critical", kind:"notion-token",
      title:"Notion token invalido",
      detail:"Credencial de Notion rechazando requests (401). Workflows que escriben a Notion no estan sincronizando.",
      fix:[ "Regenerar integration token en notion.so/my-integrations",
            "Actualizar credencial en n8n Cloud > Credentials > Notion",
            "Re-compartir las bases de datos con la integracion",
            "Re-ejecutar workflows afectados manualmente"]
    });
  }
  if (/sk-[a-z0-9]{20,}|api[_ ]?key.*(leaked|exposed)|credentials?.*exposed/i.test(corpus)) {
    errors.push({
      severity:"critical", kind:"api-key-exposed",
      title:"API key expuesta en logs",
      detail:"Se detecto lo que parece ser una API key en texto plano en logs. ROTAR INMEDIATAMENTE.",
      fix:[ "Revocar la key en el proveedor (OpenAI/Anthropic/etc)",
            "Emitir nueva key y actualizar en n8n Credentials",
            "Auditar logs historicos en aria_agent_log y purgar",
            "Revisar reglas de log sanitization en workflows"]
    });
  }

  const last = {};
  logs.forEach(l => { if (!last[l.agent_name]) last[l.agent_name] = l.created_at; });
  const inactive = A.filter(a => expectsDaily(a.cr) && (!last[a.wf] || hoursAgo(last[a.wf]) > 48));
  if (inactive.length >= 3) {
    errors.push({
      severity:"warning", kind:"inactive-daily",
      title:`${inactive.length} workflows diarios inactivos 48h+`,
      detail:"Varios agentes que deberian correr diario no han reportado. Puede ser workflow desactivado, trigger roto o credencial expirada.",
      affected: inactive.map(a => `${a.name} (${a.wf})`),
      fix:[ "Ir a n8n Cloud > Workflows y verificar que esten Active",
            "Revisar el nodo Cron de cada workflow",
            "Ejecutar manualmente para reproducir el error",
            "Revisar creditos/credenciales de servicios externos"]
    });
  }
  return errors;
};

        <path d="M0 0 L-12 -20 M0 0 L12 -20 M0 0 L0 -26 M0 0 L-6 -22 M0 0 L6 -22" stroke="#22C55E" strokeWidth="2" strokeLinecap="round"/>
        <circle cx={-8} cy={-18} r="4.5" fill="#22C55E"/>
        <circle cx={8} cy={-18} r="4.5" fill="#22C55E"/>
        <circle cx={0} cy={-25} r="4.5" fill="#16a34a"/>
      </g>

      {/* Table floor shadow */}
      <ellipse cx={cx} cy={cy + tableRy + 12} rx={tableRx + 8} ry={tableRy * 0.18} fill="#000" opacity="0.6"/>

      {/* Table pedestal */}
      <rect x={cx - 6} y={cy + tableRy - 2} width={12} height={14} fill="#1a0d05"/>
      <ellipse cx={cx} cy={cy + tableRy + 12} rx={18} ry={3} fill="#2a1d10"/>

      {/* Table side (thickness) */}
      <path d={`M${cx - tableRx} ${cy} A${tableRx} ${tableRy} 0 0 0 ${cx + tableRx} ${cy} L${cx + tableRx} ${cy + 8} A${tableRx} ${tableRy} 0 0 1 ${cx - tableRx} ${cy + 8} Z`} fill="#2a1d10"/>
      {/* Table top */}
      <ellipse cx={cx} cy={cy} rx={tableRx} ry={tableRy} fill="#5a4530"/>
      <ellipse cx={cx} cy={cy - 3} rx={tableRx - 6} ry={tableRy - 5} fill="#6a5540" opacity="0.7"/>
      {/* Table highlight */}
      <ellipse cx={cx - 50} cy={cy - 8} rx={38} ry={8} fill="#fff" opacity="0.08"/>

      {/* Chairs around table (always 8) */}
      {Array.from({ length: 8 }).map((_, i) => {
        const ang = (i / 8) * 2 * Math.PI;
        const cr = tableRx + 28;
        const crY = tableRy + 22;
        const px = cx + Math.cos(ang) * cr;
        const py = cy + Math.sin(ang) * crY;
        return (
          <g key={"chair" + i} transform={`translate(${px},${py})`}>
            <ellipse cx={0} cy={9} rx={9} ry={3} fill="#000" opacity="0.45"/>
            <rect x={-9} y={-12} width={18} height={5} fill="#1a1a28" rx="1.5"/>
            <rect x={-8} y={-6} width={16} height={12} fill="#0d0d16" rx="2"/>
            <rect x={-1} y={6} width={2} height={5} fill="#2a2a3a"/>
          </g>
        );
      })}

      {/* Laptops + participants */}
      {active && participants.length > 0 && participants.map((a, i) => {
        const ang = (i / n) * 2 * Math.PI;
        const cr = tableRx + 28;
        const crY = tableRy + 22;
        const px = cx + Math.cos(ang) * cr;
        const py = cy + Math.sin(ang) * crY;
        const laprx = tableRx * 0.72;
        const lapry = tableRy * 0.55;
        const lx = cx + Math.cos(ang) * laprx;
        const ly = cy + Math.sin(ang) * lapry;
        const c = T[a.t]?.c || "#666";
        const talking = active && i === Math.floor(Date.now() / 3500) % n;
        return (
          <g key={"p" + a.id} style={{ transition: "transform 1.5s ease-in-out" }}>
            {/* Laptop on table */}
            <g transform={`translate(${lx},${ly})`}>
              <rect x={-6} y={-3.5} width={12} height={7} fill="#0a0a10" rx="0.8"/>
              <rect x={-5.3} y={-3} width={10.6} height={6} fill={c} opacity="0.55"/>
              <rect x={-5.3} y={-3} width={10.6} height={1} fill={c} opacity="0.8"/>
            </g>
            {/* Seated agent */}
            <g transform={`translate(${px},${py})`}>
              <Humanoid color={c} size={0.9} talking={talking} seed={i * 11 + 3}/>
              <g transform="translate(0, 28)">
                <rect x={-24} y={0} width={48} height={11} fill="#0a0a10" stroke={c} strokeOpacity="0.7" strokeWidth="0.5" rx="2"/>
                <text textAnchor="middle" y={7.5} fontSize="6.5" fill={c} fontWeight="700">{a.name}</text>
              </g>
              {talking && (
                <g transform="translate(16,-16)">
                  <circle cx={0} cy={0} r="5" fill="#FBBF24" opacity="0.9">
                    <animate attributeName="opacity" values="0.5;1;0.5" dur="0.9s" repeatCount="indefinite"/>
                  </circle>
                  <text x={0} y={2} textAnchor="middle" fontSize="6" fill="#0f0f1a" fontWeight="700">...</text>
                </g>
              )}
            </g>
          </g>
        );
      })}

      {!active && (
        <text x={cx} y={cy + 4} textAnchor="middle" fontSize="12" fill="#52525b" fontStyle="italic" opacity="0.75">Esperando reunion...</text>
      )}
    </g>
  );
};

function MeetingRequestModal({ agents, teams, onClose, onSubmit }) {
  const [template, setTemplate] = useState(MEETING_TEMPLATES[0]);
  const [topic, setTopic] = useState("");
  const [priority, setPriority] = useState("media");
  const [selected, setSelected] = useState(new Set(MEETING_TEMPLATES[0].suggested));
  const [teamFilter, setTeamFilter] = useState("all");

  useEffect(() => {
    setSelected(new Set(template.suggested));
    if (template.reason !== "custom") setTopic(template.desc);
  }, [template]);

  const toggleAgent = (wf) => {
    const n = new Set(selected);
    if (n.has(wf)) n.delete(wf); else n.add(wf);
    setSelected(n);
  };

  const submit = () => {
    if (!topic.trim()) return alert("Escribe el tema de la reunion");
    if (selected.size === 0) return alert("Selecciona al menos un agente");
    onSubmit({
      topic: topic.trim(),
      participants: Array.from(selected),
      priority,
      trigger_reason: template.reason
    });
  };

  const filteredAgents = teamFilter === "all" ? agents : agents.filter(a => a.t === teamFilter);

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: 820 }}>
        <button className="modal-close" onClick={onClose}>{'×'}</button>
        <div style={{ marginBottom: 16 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ fontSize:22 }}>{'✨'}</span>
            <div>
              <div style={{ fontSize:16, fontWeight:700, color:"#C4B5FD" }}>Convocar Reunion On-Demand</div>
              <div style={{ fontSize:10, color:"#52525b", textTransform:"uppercase", letterSpacing:1 }}>Selecciona agentes y lanza</div>
            </div>
          </div>
        </div>

        <div style={{ marginBottom:14 }}>
          <div style={{ fontSize:10, color:"#71717a", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Plantilla</div>
          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
            {MEETING_TEMPLATES.map(t => (
              <button key={t.reason} onClick={() => setTemplate(t)} className="btn" style={{
                background: template.reason===t.reason ? "#8B5CF633" : "#1a1a24",
                color: template.reason===t.reason ? "#C4B5FD" : "#a1a1aa",
                border: "1px solid " + (template.reason===t.reason ? "#8B5CF6" : "#27272a"),

              }}>{t.name}</button>
            ))}

          <div style={{ fontSize:10, color:"#71717a", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Tema / Objetivo</div>

            placeholder="Que quieres que analicen? Ej: Analizar cartera vencida Pochteca y proponer acciones"

              border:"1px solid #27272a", borderRadius:8, color:"#d4d4d8",
              fontSize:12, fontFamily:"inherit", resize:"vertical"
            }}/>
        </div>

        <div style={{ marginBottom:14, display:"flex", gap:12, alignItems:"center", flexWrap:"wrap" }}>
          <div>
            <div style={{ fontSize:10, color:"#71717a", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Prioridad</div>
            <div style={{ display:"flex", gap:4 }}>
              {["critica","alta","media","baja"].map(p => (
                <button key={p} onClick={() => setPriority(p)} className="btn" style={{

                  color: priority===p ? ({critica:"#FCA5A5", alta:"#FDBA74", media:"#FDE68A", baja:"#93C5FD"}[p]) : "#a1a1aa",

                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div style={{ display:"flex", gap:8, justifyContent:"flex-end", marginTop:16 }}>
          <button onClick={onClose} className="btn" style={{ background:"#1a1a24", color:"#a1a1aa" }}>Cancelar</button>
          <button onClick={submit} className="btn" style={{ background:"#8B5CF6", color:"#fff", fontWeight:600, minWidth:140 }}>
            {'🚀'} Convocar
          </button>
        </div>

        <div style={{ marginTop:14, padding:10, background:"#0a0a10", borderRadius:6, fontSize:9, color:"#52525b", lineHeight:1.5 }}>
          {'ℹ'} La solicitud se guarda en <code style={{ color:"#a1a1aa" }}>aria_agent_meetings</code> con status <code style={{ color:"#a1a1aa" }}>requested</code>. El workflow CONVOCADOR (E0HL) la procesara: analizara datos, generara insights + propuestas con IA y actualizara el registro.
        </div>
      </div>
    </div>
  );
}

// --- ROOT APP ---
function MissionControlApp() {
  const [logs, setLogs] = useState([]);
  const [meetings, setMeetings] = useState([]);
  const [memories, setMemories] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [health, setHealth] = useState([]);
  const [pending, setPending] = useState([]);

  const [teamFilter, setTeamFilter] = useState("all");
  const [statusFilter, setStatusFilter] = useState("all");
  const [triggerFilter, setTriggerFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [view, setView] = useState("grid");
  const [expanded, setExpanded] = useState(null);
  const [loading, setLoading] = useState(true);
  const [lastRefresh, setLastRefresh] = useState(null);
  const [selectedLog, setSelectedLog] = useState(null);
  const [selectedError, setSelectedError] = useState(null);
  const [showRequestModal, setShowRequestModal] = useState(false);
  const [toast, setToast] = useState(null);

  // --- Autonomy handlers ---
  const showToast = (msg, kind = "info") => {
    setToast({ msg, kind });
    setTimeout(() => setToast(null), 4000);
  };

  const decideMeeting = useCallback(async (meetingId, decision) => {
    try {
      const res = await fetch(`${SB}/aria_agent_meetings?id=eq.${meetingId}`, {
        method: "PATCH",
        headers: { ...HD, "Content-Type": "application/json", "Prefer": "return=minimal" },
        body: JSON.stringify({ decision, decision_at: new Date().toISOString(), decided_by: "victor.muris@ryrservicios.com" })
      });
      if (!res.ok) throw new Error("Status " + res.status);
      showToast(`Reunion ${decision} correctamente`, "success");
      fetchAll();
    } catch (e) {
      showToast("Error al guardar decision: " + e.message, "error");
    }
  }, []);

  const requestMeeting = useCallback(async ({ topic, participants, priority, trigger_reason }) => {
    try {
      const body = {
        meeting_name: "Reunion On-Demand: " + (topic || "").substring(0, 40),
        topic: topic,
        participants: participants,
        trigger_reason: trigger_reason || "on_demand",
        is_on_demand: true,
        status: "scheduled",
        decision: "pendiente",
        insights: [],
        proposals: [],
        data_analyzed: { priority: priority || "media", requested_by: "victor.muris", requested_at: new Date().toISOString() }
      };
      const res = await fetch(`${SB}/aria_agent_meetings`, {
        method: "POST",
        headers: { ...HD, "Content-Type": "application/json", "Prefer": "return=representation" },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error("Status " + res.status);
      showToast("Reunion solicitada. CONVOCADOR la procesara en breve.", "success");
      setShowRequestModal(false);
      fetchAll();
    } catch (e) {
      showToast("Error al solicitar reunion: " + e.message, "error");
    }
  }, []);

  const downloadMeetingPDF = useCallback((m) => {
    try {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        showToast("jsPDF no cargo. Revisa conexion a internet.", "error");
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: "letter" });
      const margin = 48;
      const width = 612 - margin * 2;
      let y = margin;
      const addText = (txt, opts = {}) => {
        const size = opts.size || 11;
        const bold = opts.bold || false;
        const color = opts.color || [33, 33, 33];
        doc.setFontSize(size);
        doc.setFont("helvetica", bold ? "bold" : "normal");
        doc.setTextColor(...color);
        const lines = doc.splitTextToSize(String(txt || ""), width);
        lines.forEach(ln => {
          if (y > 740) { doc.addPage(); y = margin; }
          doc.text(ln, margin, y);
          y += size * 1.3;
        });
      };
      const addLine = () => {
        if (y > 740) { doc.addPage(); y = margin; }
        doc.setDrawColor(200); doc.line(margin, y, margin + width, y); y += 10;
      };
      // Header
      doc.setFillColor(13, 40, 24);
      doc.rect(0, 0, 612, 70, "F");
      doc.setTextColor(212, 168, 67);
      doc.setFontSize(22); doc.setFont("helvetica", "bold");
      doc.text("ARIA", margin, 40);
      doc.setFontSize(10); doc.setFont("helvetica", "normal");
      doc.setTextColor(200, 200, 200);
      doc.text("RyR Servicios Aduanales | Patente 1941", margin, 58);
      doc.setFontSize(9);
      doc.text(new Date(m.created_at || Date.now()).toLocaleString("es-MX"), 612 - margin, 40, { align: "right" });
      y = 100;

      addText(m.meeting_name || "Reunion", { size: 16, bold: true, color: [46, 125, 50] });
      y += 6;
      if (m.topic) { addText("Tema: " + m.topic, { size: 11, color: [100, 100, 100] }); y += 4; }
      if (Array.isArray(m.participants) && m.participants.length) {
        addText("Participantes: " + m.participants.join(", "), { size: 10, color: [100, 100, 100] });
        y += 4;
      }
      addText("Decision: " + (m.decision || "pendiente").toUpperCase(), { size: 10, bold: true, color: [180, 130, 20] });
      y += 8; addLine();

      if (m.minuta_text) {
        addText("MINUTA", { size: 13, bold: true });
        y += 4;
        addText(m.minuta_text);
        y += 8; addLine();
      }

      const insights = Array.isArray(m.insights) ? m.insights : [];
      if (insights.length > 0) {
        addText("HALLAZGOS", { size: 13, bold: true, color: [180, 130, 20] });
        y += 4;
        insights.forEach((ins, i) => {
          const obj = typeof ins === "object" && ins ? ins : { text: String(ins) };
          const prefix = obj.agent ? `[${obj.agent}] ` : "";
          addText(`${i + 1}. ${prefix}${obj.text || obj.message || ""}`);
        });
        y += 8; addLine();
      }

      const proposals = Array.isArray(m.proposals) ? m.proposals : [];
      if (proposals.length > 0) {
        addText("PROPUESTAS", { size: 13, bold: true, color: [34, 139, 34] });
        y += 4;
        proposals.forEach((p, i) => {
          const obj = typeof p === "object" && p ? p : { title: String(p) };
          addText(`${i + 1}. ${obj.title || ""}`, { bold: true });
          if (obj.priority) addText("   Prioridad: " + obj.priority.toUpperCase(), { size: 9, color: [120, 120, 120] });
          if (obj.impact) addText("   Impacto: " + obj.impact, { size: 10, color: [80, 80, 80] });
          if (obj.owner || obj.responsible) {
            addText(`   Owner: ${obj.owner || "-"}  |  Responsable: ${obj.responsible || "-"}`, { size: 9, color: [120, 120, 120] });
          }
          y += 2;
        });
      }

      // Footer
      const pages = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pages; i++) {
        doc.setPage(i);
        doc.setFontSize(8); doc.setTextColor(150);
        doc.text(`ARIA Observatory v3  |  Pagina ${i}/${pages}`, 306, 780, { align: "center" });
      }
      const fname = `minuta-${(m.meeting_name || "reunion").replace(/[^a-z0-9]+/gi, "-").toLowerCase()}-${(m.id || "").substring(0, 8)}.pdf`;
      doc.save(fname);
      showToast("PDF generado: " + fname, "success");
    } catch (e) {
      showToast("Error generando PDF: " + e.message, "error");
    }
  }, []);

  useEffect(() => {
    const p = new URLSearchParams(window.location.search);
    const q = p.get("agent");
    if (q) {
      const found = A.find(a => a.name.toLowerCase() === q.toLowerCase() || a.wf.toLowerCase() === q.toLowerCase());
      if (found) setExpanded(found.id);
    }
  }, []);

  const fetchAll = useCallback(async () => {
    try {
      const [l, m, mem, al, h, pd] = await Promise.all([
        fetch(`${SB}/aria_agent_log?order=created_at.desc&limit=500`, { headers: HD }).then(r => r.json()).catch(() => []),
        fetch(`${SB}/aria_agent_meetings?order=created_at.desc&limit=20`, { headers: HD }).then(r => r.json()).catch(() => []),
        fetch(`${SB}/aria_memory?is_active=eq.true&order=relevance_score.desc&limit=30`, { headers: HD }).then(r => r.json()).catch(() => []),
        fetch(`${SB}/aria_proactive_alerts?status=eq.pending&order=created_at.desc&limit=15`, { headers: HD }).then(r => r.json()).catch(() => []),
        fetch(`${SB}/aria_health_checks?status=eq.open&order=created_at.desc&limit=15`, { headers: HD }).then(r => r.json()).catch(() => []),
        fetch(`${SB}/pendientes_tracker?estado=neq.resuelto&estado=neq.cancelado&order=created_at.desc&limit=20`, { headers: HD }).then(r => r.json()).catch(() => []),
      ]);
      if (Array.isArray(l)) setLogs(l);
      if (Array.isArray(m)) setMeetings(m);
      if (Array.isArray(mem)) setMemories(mem);
      if (Array.isArray(al)) setAlerts(al);
      if (Array.isArray(h)) setHealth(h);
      if (Array.isArray(pd)) setPending(pd);
    } catch (_) {}
    setLoading(false);
    setLastRefresh(new Date());
  }, []);

  useEffect(() => {
    fetchAll();
    const id = setInterval(fetchAll, 20000);
    return () => clearInterval(id);
  }, [fetchAll]);

  const stats = useMemo(() => {
    const out = {};
    const nowMs = Date.now();
    const day = 86400000;
    A.forEach(a => {
      out[a.wf] = { last:null, n:0, ok:0, err:0, items:0, ok24:0, err24:0, last24:null, spark: Array(7).fill(0) };
    });
    logs.forEach(l => {
      const k = l.agent_name;
      if (!out[k]) return;
      const s = out[k];
      if (!s.last) s.last = l;
      s.n++;
      if (l.status === "success") s.ok++;
      if (l.status === "error") s.err++;
      s.items += l.items_processed || 0;
      const age = nowMs - new Date(l.created_at).getTime();
      if (age < day) {
        if (!s.last24) s.last24 = l;
        if (l.status === "success") s.ok24++;
        if (l.status === "error") s.err24++;
      }
      const dayIdx = Math.floor(age / day);
      if (dayIdx >= 0 && dayIdx < 7) s.spark[6 - dayIdx]++;
    });
    return out;
  }, [logs]);

  const recentByAgent = useMemo(() => {
    const out = {};
    logs.forEach(l => {
      if (!out[l.agent_name]) out[l.agent_name] = [];
      if (out[l.agent_name].length < 3) out[l.agent_name].push(l);
    });
    return out;
  }, [logs]);

  const agentStatus = useMemo(() => {
    const out = {};
    A.forEach(a => { out[a.id] = computeStatus(a, stats[a.wf]); });
    return out;
  }, [stats]);

  const criticalErrors = useMemo(() => detectCriticalErrors(logs, alerts, health), [logs, alerts, health]);

  const filteredAgents = useMemo(() => {
    const q = search.trim().toLowerCase();
    return A.filter(a => {
      if (teamFilter !== "all" && a.t !== teamFilter) return false;
      if (statusFilter !== "all" && agentStatus[a.id] !== statusFilter) return false;
      if (triggerFilter !== "all" && classifyTriggerType(a.cr) !== triggerFilter) return false;
      if (q && !(a.name.toLowerCase().includes(q) || a.alias.toLowerCase().includes(q) || a.role.toLowerCase().includes(q) || a.wf.toLowerCase().includes(q))) return false;
      return true;
    });
  }, [teamFilter, statusFilter, triggerFilter, search, agentStatus]);

  const teamsToRender = useMemo(() => {
    const g = {};
    filteredAgents.forEach(a => { (g[a.t] = g[a.t] || []).push(a); });
    return g;
  }, [filteredAgents]);

  const totalAgents = A.length;
  const statusCounts = useMemo(() => {
    const c = { OK:0, IDLE:0, WARNING:0, ERROR:0, FIXPENDING:0 };
    A.forEach(a => { c[agentStatus[a.id]]++; });
    return c;
  }, [agentStatus]);

  return (
    <div style={{ background:"#06060a", color:"#d4d4d8", minHeight:"100vh", fontFamily:"'JetBrains Mono','Fira Code',monospace" }}>
      <div style={{ padding:"14px 24px", display:"flex", alignItems:"center", gap:14, borderBottom:"1px solid #1a1a24", flexWrap:"wrap" }}>
        <div style={{ width:38, height:38, borderRadius:10, background:"linear-gradient(135deg,#1A5C3A,#0a1f12)", display:"flex", alignItems:"center", justifyContent:"center", border:"1px solid #1A5C3A40" }}>
          <span style={{ color:"#D4A843", fontSize:18, fontWeight:700 }}>A</span>
        </div>
        <div style={{ flex:1, minWidth:220 }}>
          <div style={{ fontSize:15, fontWeight:600, letterSpacing:1, textTransform:"uppercase", color:"#e4e4e7" }}>
            ARIA Observatory <span style={{ color:"#52525b", fontSize:11 }}>v3</span>
          </div>
          <div style={{ fontSize:10, color:"#52525b" }}>
            {totalAgents} agentes {'•'} 9 rooms {'•'} {logs.length} runs {'•'} {memories.length} memorias {'•'} {alerts.length} alertas
            {lastRefresh && <span> {'—'} {lastRefresh.toLocaleTimeString()}</span>}
          </div>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap", fontSize:10 }}>
          <span style={{ color:"#22C55E" }}>{'●'} {statusCounts.OK} OK</span>
          {statusCounts.ERROR > 0 && <span style={{ color:"#EF4444" }}>{'●'} {statusCounts.ERROR} ERR</span>}
          {statusCounts.WARNING > 0 && <span style={{ color:"#FBBF24" }}>{'●'} {statusCounts.WARNING} WARN</span>}
          {statusCounts.FIXPENDING > 0 && <span style={{ color:"#FB923C" }}>{'●'} {statusCounts.FIXPENDING} FIX</span>}
          <span style={{ color:"#71717a" }}>{'●'} {statusCounts.IDLE} IDLE</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, padding:"4px 12px", borderRadius:6, background:"#0d1a0f", border:"1px solid #1a3a1f" }}>
          <SD s="online"/>
          <span style={{ fontSize:10, color:"#22C55E", fontWeight:500, animation:"blink 2s infinite" }}>LIVE</span>
        </div>
        <button onClick={fetchAll} className="btn" style={{ background:"#0d0d12", color:"#71717a", border:"1px solid #27272a" }}>
          {loading ? <span className="loader">...</span> : "REFRESH"}
        </button>
      </div>

      <CriticalBanner errors={criticalErrors} onOpen={setSelectedError}/>

      <div className="tk" style={{ color:"#3f3f46" }}>
        <span>
          {logs.slice(0,15).map(l => {
            const ag = A.find(x => x.wf === l.agent_name);
            return `${ag?.name || l.agent_name}: ${l.status === "success" ? "OK" : "ERR"} (${tA(l.created_at)})`;
          }).join("  ●  ") + (logs.length === 0 ? "  Esperando actividad...  ●  57 agentes  ●  9 mission rooms  ●  Supabase live  ●  " : "  ●  ")}
        </span>
      </div>

      <div style={{ padding:"12px 24px", display:"flex", gap:6, alignItems:"center", flexWrap:"wrap", borderBottom:"1px solid #1a1a24" }}>
        {["grid","office","feed","alerts","memory","meetings"].map(v => (
          <button key={v} onClick={() => setView(v)} className="btn" style={{
            border: "1px solid " + (view===v ? "#2a2a3a" : "transparent"),
            background: view===v ? "#1a1a24" : "transparent",
            color: view===v ? "#fff" : "#52525b",
            fontWeight:500
          }}>
            {v==="grid" ? "Mission Rooms" : v==="office" ? `\uD83C\uDFE2 Oficina` : v==="feed" ? `Activity (${logs.length})` : v==="meetings" ? `Reuniones (${meetings.length})` : v==="memory" ? `Memoria (${memories.length})` : `Alertas (${alerts.length + health.length})`}
          </button>
        ))}
      </div>

      {view === "grid" && (
        <div style={{ padding:"12px 24px", display:"flex", gap:10, alignItems:"center", flexWrap:"wrap", borderBottom:"1px solid #1a1a24" }}>
          <input
            type="text" placeholder="Buscar por nombre, alias, rol..."
            value={search} onChange={e => setSearch(e.target.value)}
            style={{ padding:"6px 12px", borderRadius:6, background:"#0d0d12", border:"1px solid #1a1a24", color:"#d4d4d8", fontSize:11, fontFamily:"inherit", minWidth:220, flex:"0 1 260px" }}
          />
          <div style={{ display:"flex", gap:3, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:9, color:"#52525b", marginRight:4, textTransform:"uppercase", letterSpacing:1 }}>Equipo:</span>
            <button onClick={() => setTeamFilter("all")} className="btn" style={{ background:teamFilter==="all"?"#1a1a24":"transparent", color:teamFilter==="all"?"#fff":"#52525b", padding:"4px 10px", fontSize:10 }}>All</button>
            {Object.keys(T).map(k => (
              <button key={k} onClick={() => setTeamFilter(k)} className="btn" style={{ background:teamFilter===k?T[k].c+"22":"transparent", color:teamFilter===k?T[k].c:"#52525b", padding:"4px 10px", fontSize:10 }} title={T[k].n}>{T[k].e}</button>
            ))}
          </div>
          <div style={{ display:"flex", gap:3, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:9, color:"#52525b", marginRight:4, textTransform:"uppercase", letterSpacing:1 }}>Status:</span>
            <button onClick={() => setStatusFilter("all")} className="btn" style={{ background:statusFilter==="all"?"#1a1a24":"transparent", color:statusFilter==="all"?"#fff":"#52525b", padding:"4px 10px", fontSize:10 }}>All</button>
            {Object.keys(STATUS).map(k => (
              <button key={k} onClick={() => setStatusFilter(k)} className="btn" style={{ background:statusFilter===k?STATUS[k].color+"22":"transparent", color:statusFilter===k?STATUS[k].color:"#52525b", padding:"4px 10px", fontSize:10 }}>
                {STATUS[k].icon} {STATUS[k].label}
              </button>
            ))}
          </div>
          <div style={{ display:"flex", gap:3, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:9, color:"#52525b", marginRight:4, textTransform:"uppercase", letterSpacing:1 }}>Trigger:</span>
            <button onClick={() => setTriggerFilter("all")} className="btn" style={{ background:triggerFilter==="all"?"#1a1a24":"transparent", color:triggerFilter==="all"?"#fff":"#52525b", padding:"4px 10px", fontSize:10 }}>All</button>
            {Object.entries(TRIG_TYPES).map(([k,v]) => (
              <button key={k} onClick={() => setTriggerFilter(k)} className="btn" style={{ background:triggerFilter===k?"#60A5FA22":"transparent", color:triggerFilter===k?"#60A5FA":"#52525b", padding:"4px 10px", fontSize:10 }}>{v.label}</button>
            ))}
          </div>
          <div style={{ flex:1 }}/>
          <span style={{ fontSize:10, color:"#52525b" }}>{filteredAgents.length}/{totalAgents} mostrados</span>
        </div>
      )}

      <div style={{ padding:"20px 24px" }}>
        {view === "office" && <OfficeView meetings={meetings} agentStatus={agentStatus}/>}

        {view === "grid" && (
          filteredAgents.length === 0 ? (
            <div style={{ padding:60, textAlign:"center", color:"#52525b", fontSize:13 }}>
              Sin agentes que coincidan con los filtros.
              <br/>
              <button onClick={() => { setTeamFilter("all"); setStatusFilter("all"); setTriggerFilter("all"); setSearch(""); }} className="btn" style={{ marginTop:12, background:"#1a1a24", color:"#fff" }}>Limpiar filtros</button>
            </div>
          ) : Object.keys(T).filter(k => teamsToRender[k]).map(tk => {
            const tm = T[tk];
            const agents = teamsToRender[tk];
            const okC = agents.filter(a => agentStatus[a.id] === "OK").length;
            return (
              <div key={tk} className="rm" style={{ "--tc":tm.c, "--tc-glow":tm.c+"30", background:tm.bg, borderColor:tm.c+"15" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                  <span style={{ fontSize:24 }}>{tm.e}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:600, color:tm.c, letterSpacing:1.5, textTransform:"uppercase" }}>{tm.n}</div>
                    <div style={{ fontSize:9, color:"#52525b" }}>{okC}/{agents.length} operativos</div>
                  </div>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:12 }}>
                  {agents.map(a => {
                    const s = stats[a.wf];
                    const status = agentStatus[a.id];
                    const on = !!(s && s.last);
                    const rate = on ? Math.round(s.ok / Math.max(s.n, 1) * 100) : 0;
                    const recent = recentByAgent[a.wf] || [];
                    const op = expanded === a.id;
                    return (
                      <div key={a.id} className={"cd" + (on ? " on" : "")} style={{ "--tc":tm.c, "--tc-glow":tm.c+"22" }} onClick={() => setExpanded(op ? null : a.id)}>
                        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>

                            <div style={{ fontSize:9, padding:"2px 6px", borderRadius:4, background:tm.c+"14", color:tm.c, fontWeight:600 }}>{a.cr}</div>

                          </div>
                        </div>
                        <div style={{ marginBottom:8 }}><StatusBadge status={status}/></div>
                        <div style={{ fontSize:10, color:"#52525b", lineHeight:1.5, marginBottom:8, minHeight:28, borderLeft:`2px solid ${tm.c}22`, paddingLeft:8 }}>{a.role}</div>
                        {on ? (
                          <div style={{ marginBottom:8 }}>
                            <div style={{ background:"#1a1a24", borderRadius:3, height:3, overflow:"hidden", marginBottom:4 }}>
                              <div style={{ width:rate+"%", height:"100%", borderRadius:3, background: rate>80?"#22C55E":rate>50?"#FBBF24":"#EF4444", transition:"width .6s ease" }}/>
                            </div>
                            <div style={{ display:"flex", gap:6, fontSize:9, color:"#3f3f46" }}>
                              <span style={{ color:"#22C55E" }}>{s.ok} ok</span>
                              {s.err > 0 && <span style={{ color:"#EF4444" }}>{s.err} err</span>}
                              <span style={{ marginLeft:"auto" }}>{s.items} items</span>
                              <span style={{ color:tm.c }}>{rate}%</span>
                            </div>
                          </div>
                        ) : (
                          <div style={{ height:3, background:"#1a1a24", borderRadius:3, marginBottom:8 }}/>
                        )}
                        <div style={{ borderTop:`1px solid ${tm.c}14`, paddingTop:8, display:"flex", alignItems:"center", gap:8 }}>
                          <Sparkline data={s?.spark || []} color={tm.c} w={70} h={20}/>
                          <span style={{ fontSize:9, color:"#3f3f46" }}>7d</span>
                          <span style={{ fontSize:9, color:tm.c, marginLeft:"auto", fontWeight:600 }}>{s ? s.n : 0} runs</span>
                        </div>
                        {op && (
                          <div style={{ marginTop:10, padding:10, background:"#08080c", borderRadius:8, fontSize:10, color:"#71717a", lineHeight:1.8 }}>
                            <div><span style={{ color:"#52525b" }}>workflow:</span> {a.wf}</div>
                            <div><span style={{ color:"#52525b" }}>id:</span> {a.id}</div>
                            <div><span style={{ color:"#52525b" }}>trigger:</span> {classifyTriggerType(a.cr)} ({a.cr})</div>
                            <div><span style={{ color:"#52525b" }}>room:</span> <span style={{ color:tm.c }}>{tm.n}</span></div>
                            {on && <div><span style={{ color:"#52525b" }}>24h:</span> {s.ok24} ok • {s.err24} err</div>}
                            {recent.length > 0 && (
                              <div style={{ marginTop:8, borderTop:`1px solid ${tm.c}10`, paddingTop:8 }}>
                                <div style={{ fontSize:9, color:"#52525b", textTransform:"uppercase", letterSpacing:1, marginBottom:4 }}>Ultimos runs</div>
                                {recent.map((l,i) => (
                                  <div key={i} onClick={e => { e.stopPropagation(); setSelectedLog(l); }} style={{ display:"flex", alignItems:"center", gap:6, padding:"3px 0", fontSize:9, cursor:"pointer" }}>
                                    <SD s={l.status}/>
                                    <span style={{ color:"#a1a1aa", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{l.action}</span>
                                    <span style={{ color:"#52525b" }}>{tA(l.created_at)}</span>
                                  </div>
                                ))}
                              </div>
                            )}
                            <button onClick={e => { e.stopPropagation(); navigator.clipboard?.writeText(window.location.origin + window.location.pathname + "?agent=" + encodeURIComponent(a.name)); }} className="btn" style={{ marginTop:8, background:tm.c+"18", color:tm.c, fontSize:9, padding:"3px 8px" }}>
                              {'🔗'} copiar deep-link
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })
        )}

        {view === "feed" && (
          <div style={{ background:"#0a0a10", borderRadius:12, border:"1px solid #1a1a24", maxHeight:720, overflowY:"auto" }}>
            {logs.length === 0 ? (
              <div style={{ padding:"60px 20px", textAlign:"center", fontSize:13, color:"#27272a" }}>Awaiting transmissions...</div>
            ) : logs.slice(0, 150).map(l => {
              const ag = A.find(x => x.wf === l.agent_name);
              const tm = ag ? T[ag.t] : { c:"#555" };
              const summary = l.details?.summary || l.action || "—";
              return (
                <div key={l.id} onClick={() => setSelectedLog(l)} style={{ display:"flex", alignItems:"center", gap:10, padding:"9px 16px", borderBottom:"1px solid #111118", fontSize:11, cursor:"pointer", transition:"background .15s" }} onMouseEnter={e => e.currentTarget.style.background="#0d0d12"} onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                  {ag && <Av a={ag} sz={26}/>}
                  <SD s={l.status}/>
                  <span style={{ fontWeight:600, color:tm.c, minWidth:92 }}>{ag?.name || l.agent_name}</span>
                  <span style={{ color:"#a1a1aa", flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{summary}</span>
                  {l.items_processed > 0 && <span style={{ color:"#71717a", fontSize:10 }}>{l.items_processed}x</span>}
                  <span style={{ color:"#3f3f46", fontSize:10 }}>{tA(l.created_at)}</span>
                </div>
              );
            })}
          </div>
        )}

        {view === "alerts" && (
          <div>
            <div style={{ fontSize:12, color:"#52525b", marginBottom:12 }}>
              {'🚨'} {alerts.length} alertas pendientes {'•'} {health.length} health checks abiertos {'•'} {pending.length} pendientes tracker
            </div>
            {alerts.length === 0 && health.length === 0 && pending.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", fontSize:13, color:"#27272a" }}>✅ Sin alertas pendientes. Todo bajo control.</div>
            ) : (
              <div style={{ display:"grid", gap:8 }}>
                {alerts.map(a => {
                  const sev = { critical:"#EF4444", warning:"#FBBF24", info:"#60A5FA" }[a.severity] || "#555";
                  return (
                    <div key={a.id} style={{ background:"#0d0d12", border:"1px solid #1a1a24", borderRadius:10, padding:"12px 16px", borderLeft:`3px solid ${sev}` }}>
                      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
                        <span className="bdg" style={{ background:sev+"22", color:sev }}>{a.severity}</span>
                        <span style={{ fontSize:12, fontWeight:600, color:"#e4e4e7" }}>{a.title}</span>
                      </div>
                      {a.body && <div style={{ fontSize:11, color:"#a1a1aa", marginTop:6, lineHeight:1.5 }}>{a.body}</div>}
                      {a.suggested_action && <div style={{ fontSize:10, color:"#34D399", marginTop:6 }}>→ {a.suggested_action}</div>}
                      <div style={{ fontSize:9, color:"#52525b", marginTop:6 }}>
                        {tA(a.created_at)}{(a.source_agents || []).length ? " • " + (a.source_agents || []).join(", ") : ""}
                      </div>
                    </div>
                  );
                })}
                {health.length > 0 && (
                  <div style={{ marginTop:16 }}>
                    <div style={{ fontSize:11, fontWeight:600, color:"#F43F5E", marginBottom:8, textTransform:"uppercase", letterSpacing:1 }}>{'🏥'} Health Checks Abiertos</div>
                    {health.map(h => {
                      const sev = { critical:"#EF4444", error:"#FB923C", warning:"#FBBF24", info:"#60A5FA" }[h.severity] || "#555";
                      return (
                        <div key={h.id} style={{ background:"#0d0d12", border:"1px solid #1a1a24", borderRadius:8, padding:"10px 14px", borderLeft:`3px solid ${sev}`, marginBottom:6 }}>
                          <div style={{ fontSize:11, color:"#d4d4d8" }}>{h.issue}</div>
                          <div style={{ fontSize:9, color:"#52525b", marginTop:4 }}>{h.workflow_name} • {h.check_type} • {tA(h.created_at)}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
                {pending.length > 0 && (
                  <div style={{ marginTop:16 }}>
                    <div style={{ fontSize:11, fontWeight:600, color:"#60A5FA", marginBottom:8, textTransform:"uppercase", letterSpacing:1 }}>📋 Pendientes Tracker</div>
                    {pending.map(p => (
                      <div key={p.id} style={{ background:"#0d0d12", border:"1px solid #1a1a24", borderRadius:8, padding:"10px 14px", marginBottom:6 }}>
                        <div style={{ fontSize:11, color:"#d4d4d8", fontWeight:600 }}>{p.titulo || (p.descripcion || "").slice(0,80) || "Pendiente"}</div>
                        <div style={{ fontSize:9, color:"#52525b", marginTop:4 }}>{p.responsable || ""} {p.estado && `• ${p.estado}`} {p.created_at && `• ${tA(p.created_at)}`}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        )}

        {view === "memory" && (
          <div>
            <div style={{ fontSize:12, color:"#52525b", marginBottom:12 }}>
              {'🧠'} Memoria ARIA {'—'} {memories.length} activas, auto-decay 30d
            </div>
            {memories.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", fontSize:13, color:"#27272a" }}>Aun no hay memorias registradas.</div>
            ) : (
              <div style={{ display:"grid", gap:8 }}>
                {memories.map(m => {
                  const emoji = { decision:"✅", pattern:"🔄", learning:"💡", context:"📌", preference:"⚙️" }[m.memory_type] || "📝";
                  const catColor = { cobranza:"#FBBF24", operacion:"#FB923C", regulatorio:"#EF4444", equipo:"#60A5FA", cliente:"#34D399", tecnologia:"#8B5CF6", general:"#71717a" }[m.category] || "#555";
                  return (
                    <div key={m.id} style={{ background:"#0d0d12", border:"1px solid #1a1a24", borderRadius:10, padding:"12px 16px", borderLeft:`3px solid ${catColor}` }}>
                      <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:6, flexWrap:"wrap" }}>
                        <span style={{ fontSize:14 }}>{emoji}</span>
                        <span className="bdg" style={{ background:catColor+"22", color:catColor }}>{m.category}</span>
                        <span className="bdg" style={{ background:"#1a1a24", color:"#a1a1aa" }}>{m.memory_type}</span>
                        <span style={{ marginLeft:"auto", fontSize:9, color:"#52525b" }}>rel: {(m.relevance_score || 0).toFixed(2)}</span>
                      </div>
                      <div style={{ fontSize:11, color:"#d4d4d8", lineHeight:1.6 }}>{m.content}</div>
                      {m.tags?.length > 0 && (
                        <div style={{ display:"flex", gap:4, marginTop:8, flexWrap:"wrap" }}>
                          {m.tags.map((t,i) => <span key={i} style={{ fontSize:8, padding:"1px 6px", borderRadius:4, background:"#1a1a24", color:"#71717a" }}>#{t}</span>)}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {view === "meetings" && (
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14, flexWrap:"wrap" }}>
              <div style={{ fontSize:12, color:"#52525b", flex:1 }}>
                {'📅'} Reuniones {'—'} automaticas 7pm + on-demand
              </div>
              <button onClick={() => setShowRequestModal(true)} className="btn" style={{ background:"#8B5CF622", color:"#C4B5FD", border:"1px solid #8B5CF640", fontWeight:600 }}>
                {'✨'} Convocar Reunion
              </button>
            </div>
            {meetings.length === 0 ? (
              <div style={{ padding:40, textAlign:"center", fontSize:13, color:"#27272a" }}>Primera reunion hoy a las 7pm</div>
            ) : (
              <div style={{ display:"grid", gap:10 }}>
                {meetings.map(m => {
                  const dc = m.decision || "pendiente";
                  const DC = { pendiente:"#FBBF24", aprobada:"#22C55E", editada:"#60A5FA", rechazada:"#EF4444", requested:"#8B5CF6" };
                  const insights = Array.isArray(m.insights) ? m.insights : [];
                  const proposals = Array.isArray(m.proposals) ? m.proposals : [];
                  return (
                    <div key={m.id} style={{ background:"#0d0d12", border:"1px solid #1a1a24", borderRadius:12, padding:"14px 16px", borderLeft:`3px solid ${DC[dc] || "#FBBF24"}` }}>
                      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
                        <span style={{ fontSize:13, fontWeight:600, color:"#e4e4e7" }}>{m.meeting_name || "Reunion"}</span>
                        {m.is_on_demand && <span className="bdg" style={{ background:"#8B5CF622", color:"#8B5CF6" }}>ON-DEMAND</span>}
                        <span className="bdg" style={{ background:(DC[dc]||"#FBBF24")+"22", color:DC[dc]||"#FBBF24" }}>{dc}</span>
                        <div style={{ marginLeft:"auto", display:"flex", gap:4 }}>
                          <button onClick={() => downloadMeetingPDF(m)} title="Descargar minuta PDF" className="btn" style={{ background:"#1a1a24", color:"#C4B5FD", fontSize:10, padding:"4px 10px", minHeight:28 }}>
                            {'📄'} PDF
                          </button>
                          {dc === "pendiente" && (
                            <>
                              <button onClick={() => decideMeeting(m.id, "aprobada")} title="Aprobar todas las propuestas" className="btn" style={{ background:"#22C55E22", color:"#22C55E", fontSize:10, padding:"4px 10px", minHeight:28 }}>{'✓'} Aprobar</button>
                              <button onClick={() => decideMeeting(m.id, "rechazada")} title="Rechazar" className="btn" style={{ background:"#EF444422", color:"#FCA5A5", fontSize:10, padding:"4px 10px", minHeight:28 }}>{'✗'} Rechazar</button>
                            </>
                          )}
                        </div>
                      </div>
                      <div style={{ fontSize:11, color:"#a1a1aa", marginTop:6, lineHeight:1.5 }}>{(m.topic || "").substring(0,180)}</div>
                      {Array.isArray(m.participants) && m.participants.length > 0 && (
                        <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginTop:6 }}>
                          {m.participants.map((p,i) => <span key={i} className="bdg" style={{ background:"#1a1a24", color:"#a1a1aa" }}>{p}</span>)}
                        </div>
                      )}
                      <div style={{ display:"flex", gap:10, marginTop:8, fontSize:9, color:"#52525b" }}>
                        <span>{insights.length} insights</span>
                        <span>{proposals.length} propuestas</span>
                        <span style={{ marginLeft:"auto" }}>{tA(m.created_at)}</span>
                      </div>
                      {Array.isArray(m.sent_emails) && m.sent_emails.length > 0 && (
                        <div style={{ marginTop:10, padding:10, background:"#0a0a10", borderRadius:6, border:"1px solid #1e3a8a" }}>
                          <div style={{ fontSize:9, color:"#60A5FA", textTransform:"uppercase", letterSpacing:1, fontWeight:700, marginBottom:6 }}>
                            {'\uD83D\uDCE7'} Correos enviados autonomamente ({m.sent_emails.length})
                          </div>
                          {m.sent_emails.map((se, i) => (
                            <div key={i} style={{ fontSize:10, color:"#a1a1aa", padding:"4px 0", borderBottom: i < m.sent_emails.length - 1 ? "1px solid #1a1a24" : "none" }}>
                              <span style={{ color:"#60A5FA" }}>{se.to || se.to_email}</span>
                              <span style={{ color:"#52525b" }}> {'\u2022'} {se.proposals_count || 0} propuesta(s) {'\u2022'} </span>
                              <span style={{ color:"#71717a" }}>{se.sent_at ? tA(se.sent_at) : ""}</span>
                              {se.subject && <div style={{ fontSize:9, color:"#71717a", marginTop:2 }}>{'\u21B3'} {se.subject}</div>}
                            </div>
                          ))}
                          <div style={{ fontSize:9, color:"#52525b", marginTop:6, fontStyle:"italic" }}>
                            Victor CC en todos los correos {'\u2022'} JEFA dara seguimiento via pendientes_tracker
                          </div>
                        </div>
                      )}
                      {(insights.length > 0 || proposals.length > 0) && (
                        <details style={{ marginTop:8 }}>
                          <summary>Ver insights y propuestas</summary>
                          <div style={{ marginTop:10, fontSize:11, lineHeight:1.6 }}>
                            {insights.length > 0 && (
                              <div style={{ marginBottom:12 }}>
                                <div style={{ fontSize:10, color:"#FBBF24", textTransform:"uppercase", letterSpacing:1, marginBottom:6, fontWeight:600 }}>{'💡'} Hallazgos</div>
                                {insights.map((ins,i) => {
                                  const obj = typeof ins === "object" && ins ? ins : { text: String(ins) };
                                  return (
                                    <div key={"i"+i} style={{ padding:"8px 10px", background:"#0a0a10", borderRadius:6, marginBottom:4, borderLeft:"2px solid #FBBF24" }}>
                                      {obj.agent && <span style={{ fontSize:9, color:"#FBBF24", fontWeight:600, marginRight:6 }}>[{obj.agent}]</span>}
                                      <span style={{ color:"#d4d4d8" }}>{obj.text || obj.message || JSON.stringify(obj)}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                            {proposals.length > 0 && (
                              <div>
                                <div style={{ fontSize:10, color:"#34D399", textTransform:"uppercase", letterSpacing:1, marginBottom:6, fontWeight:600 }}>{'🎯'} Propuestas</div>
                                {proposals.map((p,i) => {
                                  const obj = typeof p === "object" && p ? p : { title: String(p) };
                                  const prioColor = { critica:"#EF4444", alta:"#FB923C", media:"#FBBF24", baja:"#60A5FA" }[obj.priority] || "#71717a";
                                  const prioEmoji = { critica:"🔴", alta:"🟠", media:"🟡", baja:"🔵" }[obj.priority] || "⚪";
                                  return (
                                    <div key={"p"+i} style={{ padding:"10px 12px", background:"#0a0a10", borderRadius:6, marginBottom:6, borderLeft:`2px solid ${prioColor}` }}>
                                      <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap", marginBottom:4 }}>
                                        <span>{prioEmoji}</span>
                                        <span style={{ fontWeight:600, color:"#e4e4e7" }}>{obj.title || JSON.stringify(obj)}</span>
                                        {obj.priority && <span className="bdg" style={{ background:prioColor+"22", color:prioColor }}>{obj.priority}</span>}
                                      </div>
                                      {obj.impact && <div style={{ fontSize:10, color:"#a1a1aa", marginBottom:3 }}><span style={{ color:"#52525b" }}>Impacto:</span> {obj.impact}</div>}
                                      {(obj.owner || obj.responsible) && (
                                        <div style={{ fontSize:10, color:"#52525b" }}>
                                          {obj.owner && <span>Owner: <span style={{ color:"#C4B5FD" }}>{obj.owner}</span></span>}
                                          {obj.owner && obj.responsible && <span> {'→'} </span>}
                                          {obj.responsible && <span>Responsable: <span style={{ color:"#60A5FA" }}>{obj.responsible}</span></span>}
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        </details>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>

      <LogDetailPanel log={selectedLog} onClose={() => setSelectedLog(null)}/>
      <CriticalModal error={selectedError} onClose={() => setSelectedError(null)}/>
      {showRequestModal && <MeetingRequestModal agents={A} teams={T} onClose={() => setShowRequestModal(false)} onSubmit={requestMeeting}/>}
      {toast && (
        <div style={{
          position:"fixed", bottom:24, right:24, zIndex:100,
          padding:"12px 18px", borderRadius:10,
          background: toast.kind==="success"?"#0d2818":toast.kind==="error"?"#2a0a0a":"#0a1a2a",
          border:"1px solid " + (toast.kind==="success"?"#22C55E55":toast.kind==="error"?"#EF444455":"#60A5FA55"),
          color: toast.kind==="success"?"#86EFAC":toast.kind==="error"?"#FCA5A5":"#93C5FD",
          fontSize:12, fontWeight:500, maxWidth:420, boxShadow:"0 8px 32px rgba(0,0,0,.5)"
        }}>
          {toast.kind==="success"?"✓ ":toast.kind==="error"?"✗ ":"ℹ "}{toast.msg}
        </div>
      )}

      <div style={{ padding:"14px 24px", borderTop:"1px solid #1a1a24", textAlign:"center", fontSize:9, color:"#27272a" }}>
        ARIA Observatory v3 {'•'} {totalAgents} agentes {'•'} 9 mission rooms {'•'} auto-refresh 20s
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(MissionControlApp));
</script>
</body>
</html>
